name: Shavasana ontspanning audio
price: "9"
description: Begeleide shavasana diepe ontspanning audio. Ideaal bij overprikkeling en stress. Direct luisteren na aankoop.
longDescription: >-
  Deze audio begeleidt je door een diepe shavasana-ontspanning — dezelfde
  ontspanning waarmee elke yogales bij Yogapracht eindigt. Perfect voor
  als je even tot rust wilt komen na een drukke dag, moeite hebt met
  inslapen, of je zenuwstelsel wilt kalmeren. Zet je koptelefoon op,
  ga liggen, en laat Mariëlle je begeleiden naar volledige ontspanning.
features: |-
  Begeleide shavasana audio (20 minuten)
  Ingesproken door Mariëlle
  Direct luisteren na aankoop
  Onbeperkt terugluisteren
  Ideaal voor voor het slapengaan
ctaText: Nu bestellen — €9
