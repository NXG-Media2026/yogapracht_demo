question: Wat is hatha-rajayoga precies?
answer: >-
  Hatha-rajayoga is een vorm van yoga gericht op bewustzijnsontwikkeling.
  Hathayoga richt zich op het fysieke aspect, terwijl rajayoga zich richt op de
  geest. De lessen zijn gebaseerd op de wetenschap van de Indiase filosoof
  Patanjali.
