title: Bedrijfsyoga
subtitle: Yogalessen op de werkvloer voor meer rust en energie bij jouw team. Op locatie in de regio Hilvarenbeek.
description: >-
  Bedrijfsyoga brengt de voordelen van yoga naar de werkvloer. Een wekelijkse
  les van 30-60 minuten zorgt voor minder stress, betere concentratie en meer
  energie bij je medewerkers. De lessen worden afgestemd op de mogelijkheden
  ter plaatse — op stoelen, staand, of op een matje. Mariëlle komt naar jullie
  locatie in Hilvarenbeek en omgeving.
voorWie: |-
  Teams die last hebben van werkstress
  Bedrijven die investeren in vitaliteit
  Kantoren die een actieve pauze willen bieden
  Organisaties in de regio Hilvarenbeek
praktisch: |-
  Wanneer: wekelijks op een vast moment (in overleg)
  Locatie: op jullie werklocatie
  Duur: 30, 45 of 60 minuten
  Groepsgrootte: 4-15 personen
  Benodigdheden: een ruimte van minimaal 3x4 meter
prijs: Vanaf €75 per les (afhankelijk van groepsgrootte en duur)
