title: "Priv\xE9lessen yoga"
subtitle: Persoonlijke begeleiding op maat, in de studio of bij jou thuis. Beschikbaar in Nederlands en Engels.
description: >-
  Privélessen zijn volledig afgestemd op jouw wensen en behoeften. Of je nu
  werkt aan een specifieke klacht (chronische pijn, overprikkeling,
  zwangerschap, depressie), je yogabeoefening wilt verdiepen, of liever
  één-op-één werkt in plaats van in een groep — Mariëlle stemt elke les
  individueel af.
voorWie: |-
  Mensen met specifieke klachten (pijn, overprikkeling, depressie)
  Zwangeren die veilig yoga willen beoefenen
  Engelstaligen die liever in het Engels les krijgen
  Iedereen die de voorkeur geeft aan individuele begeleiding
praktisch: |-
  Wanneer: op afspraak (flexibele tijden)
  Locatie: in de studio of bij jou thuis
  Duur: 60 of 75 minuten
  Taal: Nederlands of Engels
prijs: "€55 per les (60 min) / €65 per les (75 min)"
