title: Stoelyoga
subtitle: Alle voordelen van yoga, zittend op een stoel. Toegankelijk voor iedereen, ongeacht mobiliteit.
description: >-
  Stoelyoga biedt dezelfde voordelen als reguliere yoga — meer rust,
  souplesse en bewustzijn — maar dan volledig zittend of staand met steun
  van een stoel. Ideaal voor mensen die niet makkelijk op een matje kunnen,
  maar wel willen profiteren van ademhalingsoefeningen, zachte houdingen
  en meditatie. Mariëlle behaalde in 2023 haar stoelyoga-certificering.
voorWie: |-
  Ouderen die moeite hebben met op de grond zitten
  Mensen met beperkte mobiliteit of balansklachten
  Herstellenden na een operatie of blessure
  Kantoorwerkers die tussendoor willen bewegen
  Iedereen die een laagdrempelige instap zoekt
praktisch: |-
  Wanneer: op aanvraag (privé of in groepsverband)
  Locatie: in de studio, bij jou thuis, of op locatie
  Duur: 45-60 minuten
  Benodigdheden: een stevige stoel (zonder armleuningen)
prijs: Op aanvraag
