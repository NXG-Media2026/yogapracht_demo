title: Groepslessen hatha-rajayoga
subtitle: Wekelijkse hatha-rajayoga in een kleine groep. Persoonlijke aandacht en ruimte om in je eigen tempo te oefenen.
description: >-
  De groepslessen bij Yogapracht zijn wekelijkse hatha-rajayoga lessen in een
  kleine groep. Elke les volgt dezelfde opbouw: houdingen (asana's),
  ademhalingsoefeningen (pranayama), meditatie en een diepe ontspanning
  (shavasana). De lessen worden gegeven door Mariëlle in haar studio aan de
  Hakvoortseweg in Hilvarenbeek.
voorWie: |-
  Iedereen die meer rust en balans zoekt
  Beginners (geen ervaring nodig)
  Gevorderden die hun beoefening willen verdiepen
  Mensen met stressklachten of slaapproblemen
praktisch: |-
  Dag: Maandag
  Tijd: 09:00 - 10:15 (Morgenstond Yoga)
  Duur: 75 minuten
  Locatie: Hakvoortseweg 12, Hilvarenbeek
  Groepsgrootte: maximaal 8 personen
  Eerste les: gratis proefles
prijs: "€15 per les / €130 per 10-rittenkaart"
