title: Gratis masterclass yoga bij overprikkeling
description: >-
  In deze gratis live masterclass leer je hoe yoga je zenuwstelsel kalmeert
  en hoe je overprikkeling kunt voorkomen. Mariëlle deelt praktische oefeningen
  die je direct kunt toepassen — ook als je nog nooit yoga hebt gedaan.
forWho: |-
  Je hebt last van overprikkeling of HSP
  Je bent vaak moe maar kunt niet ontspannen
  Je zoekt een natuurlijke manier om tot rust te komen
  Je wilt ervaren wat yoga voor jou kan betekenen
learningGoals: |-
  Wat overprikkeling is en hoe het je zenuwstelsel beïnvloedt
  Drie ademhalingsoefeningen die direct rust geven
  Hoe zachte yogahoudingen spanning loslaten
  Een mini-ontspanning die je dagelijks kunt doen
ctaText: Gratis aanmelden
