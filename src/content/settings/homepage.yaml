heroTitel: "Yogapracht Hilvarenbeek — rust en balans door hatha-rajayoga"
heroSubtekst: >-
  Je draagt veel, staat altijd aan en komt niet tot rust. In de studio aan de
  Hakvoortseweg in Hilvarenbeek leer je door yoga weer ruimte maken voor jezelf.
heroCtaPrimary: Gratis proefles aanvragen
heroCtaSecondary: Bekijk de mogelijkheden
introTitel: Hatha-rajayoga in Hilvarenbeek
introTekst: >-
  Yogapracht is de yogapraktijk van Mariëlle van der Geest aan de Hakvoortseweg
  in Hilvarenbeek. Als gediplomeerd hatha-rajayoga docent begeleidt zij mensen
  die last hebben van overprikkeling, stress of chronische spanning. De lessen
  combineren houdingen, ademhaling, meditatie en diepe ontspanning — gebaseerd
  op de yogasutra's van Patanjali.
ctaBandTitel: Ervaar zelf wat yoga voor jou kan betekenen
ctaBandTekst: >-
  Boek een gratis en vrijblijvende proefles in de studio in Hilvarenbeek.
  Geen ervaring nodig — Mariëlle past elke les aan op jouw niveau.
ctaBandKnop: Gratis proefles aanvragen
