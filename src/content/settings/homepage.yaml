heroTitel: "Yogapracht Hilvarenbeek — rust en balans door hatha-rajayoga"
heroSubtekst: >-
  In een wereld van drukte en hectiek bied ik je een veilige omgeving om even
  stil te staan en jezelf een cadeau te geven door middel van yoga.
heroCtaPrimary: Gratis proefles aanvragen
heroCtaSecondary: Bekijk de mogelijkheden
introTitel: Yoga in Hilvarenbeek
introTekst: >-
  Yogapracht is de yogapraktijk van Mariëlle van der Geest in Hilvarenbeek.
  Als gediplomeerd hatha-rajayoga docent begeleidt zij mensen die meer rust,
  balans en bewustzijn zoeken in hun leven. De lessen zijn gebaseerd op de
  yogasutra's van Patanjali — een tijdloze filosofie die lichaam en geest met
  elkaar verbindt. Of je nu voor het eerst op een matje stapt of al jaren
  oefent: bij Yogapracht is er een vorm die bij jou past.
ctaBandTitel: Ervaar zelf de kracht van yoga
ctaBandTekst: >-
  Boek een gratis en vrijblijvende proefles en ontdek wat hatha-rajayoga voor
  jou kan betekenen. Geen ervaring nodig — alleen de wil om het te proberen.
ctaBandKnop: Gratis proefles aanvragen
