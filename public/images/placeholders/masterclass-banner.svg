<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#2d3b1a"/>
  <!-- Soft gradient overlay -->
  <rect width="1200" height="630" fill="url(#grad1)" opacity="0.5"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5a2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a2410;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Decorative circles -->
  <circle cx="900" cy="315" r="250" fill="#6b7b3a" opacity="0.15"/>
  <circle cx="900" cy="315" r="180" fill="#6b7b3a" opacity="0.1"/>
  <circle cx="900" cy="315" r="110" fill="#8a9e52" opacity="0.1"/>
  <!-- Meditation silhouette -->
  <g transform="translate(900, 280)" opacity="0.4">
    <circle cx="0" cy="-45" r="20" fill="#f5f0eb"/>
    <path d="M-40 10 Q-30 -20 0 -25 Q30 -20 40 10 Q30 40 0 45 Q-30 40 -40 10Z" fill="#f5f0eb"/>
    <path d="M-50 30 Q-25 50 0 45 Q25 50 50 30 Q40 60 0 65 Q-40 60 -50 30Z" fill="#f5f0eb"/>
  </g>
  <!-- Light rays -->
  <g opacity="0.1">
    <line x1="900" y1="280" x2="700" y2="80" stroke="#f5f0eb" stroke-width="1"/>
    <line x1="900" y1="280" x2="800" y2="50" stroke="#f5f0eb" stroke-width="1"/>
    <line x1="900" y1="280" x2="950" y2="50" stroke="#f5f0eb" stroke-width="1"/>
    <line x1="900" y1="280" x2="1100" y2="80" stroke="#f5f0eb" stroke-width="1"/>
  </g>
  <!-- Text area -->
  <text x="100" y="240" font-family="system-ui, sans-serif" font-size="18" fill="#8a9e52" font-weight="500" letter-spacing="3" text-transform="uppercase">GRATIS LIVE</text>
  <text x="100" y="300" font-family="system-ui, sans-serif" font-size="48" fill="#f5f0eb" font-weight="700">Masterclass</text>
  <text x="100" y="355" font-family="system-ui, sans-serif" font-size="32" fill="#f5f0eb" font-weight="400" opacity="0.9">Yoga bij overprikkeling</text>
  <text x="100" y="420" font-family="system-ui, sans-serif" font-size="18" fill="#f5f0eb" opacity="0.7">Leer hoe je je zenuwstelsel kalmeert</text>
  <!-- CTA button shape -->
  <rect x="100" y="470" width="240" height="50" rx="25" fill="#8a9e52"/>
  <text x="220" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#ffffff" font-weight="600">Meld je gratis aan</text>
</svg>
